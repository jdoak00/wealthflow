<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#3B82F6"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Wealth Flow"/>
  <title>Wealth Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#F8FAFC;font-family:'DM Sans',sans-serif;}
    #root{max-width:430px;margin:0 auto;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const EXPENSE_CATEGORIES = [
  { id:"housing",       label:"Bydlení",      icon:"🏠", color:"#8B5CF6" },
  { id:"food",          label:"Jídlo",         icon:"🍽️", color:"#F97316" },
  { id:"shopping",      label:"Nákupy",        icon:"🛍️", color:"#F59E0B" },
  { id:"entertainment", label:"Zábava",        icon:"🎬", color:"#EC4899" },
  { id:"media",         label:"Média",         icon:"📺", color:"#6366F1" },
  { id:"investments",   label:"Investice",     icon:"📈", color:"#0EA5E9" },
  { id:"car",           label:"Auto",          icon:"🚗", color:"#64748B" },
  { id:"transport",     label:"Doprava",       icon:"🚌", color:"#3B82F6" },
  { id:"beauty",        label:"Krása",         icon:"💅", color:"#F472B6" },
  { id:"health",        label:"Zdraví",        icon:"💊", color:"#10B981" },
  { id:"snacks",        label:"Občerstvení",   icon:"☕", color:"#D97706" },
];

const INCOME_CATEGORIES = [
  { id:"salary",     label:"Mzda",      icon:"💼", color:"#22C55E" },
  { id:"invoice",    label:"Faktura",   icon:"🧾", color:"#0EA5E9" },
  { id:"inv_income", label:"Investice", icon:"📈", color:"#6366F1" },
  { id:"rent",       label:"Nájem",     icon:"🏡", color:"#F59E0B" },
  { id:"other_inc",  label:"Jiné",      icon:"💰", color:"#94A3B8" },
];

const INV_TYPES = ["Akcie","Bitcoin","ETF"];
const INV_CURRENCIES = ["CZK","EUR","USD"];
const ALL_CATEGORIES = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES];
const MONTHS_CZ = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const DAYS_CZ = ["Ne","Po","Út","St","Čt","Pá","So"];

function formatMoney(n, currency, decimals=false) {
  const fd = decimals ? 2 : 0;
  if(currency==="EUR") return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"EUR",maximumFractionDigits:fd}).format(n);
  if(currency==="USD") return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"USD",maximumFractionDigits:fd}).format(n);
  return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:fd}).format(n);
}
function formatCZK(n){return formatMoney(n,"CZK");}
const STORAGE_KEY = "wealthflow_v5";
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}
function getCat(id){return ALL_CATEGORIES.find(c=>c.id===id)||{label:"Ostatní",icon:"📦",color:"#94A3B8"};}
function parseAmount(v){return parseFloat(String(v).replace(",","."))||0;}
function fmtDate(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  return `${d.getDate()}. ${MONTHS_CZ[d.getMonth()]} ${d.getFullYear()} (${DAYS_CZ[d.getDay()]})`;
}

function PieChart({data,size=150}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0) return <div style={{textAlign:"center",color:"#94A3B8",padding:20,fontSize:13}}>Žádné výdaje</div>;
  const cx=size/2,cy=size/2,r=size/2-6;
  let angle=-Math.PI/2;
  const slices=data.filter(d=>d.value>0).map(d=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return{...d,path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth={2}/>)}
      <circle cx={cx} cy={cy} r={r*0.42} fill="#fff"/>
      <text x={cx} y={cy-5} textAnchor="middle" fontSize={9} fill="#94A3B8" fontFamily="DM Sans">Výdaje</text>
      <text x={cx} y={cy+9} textAnchor="middle" fontSize={10} fill="#0F172A" fontWeight="700" fontFamily="DM Sans">{formatCZK(total)}</text>
    </svg>
  );
}

function App(){
  const now=new Date();
  const [transactions,setTransactions]=useState([]);
  const [investments,setInvestments]=useState([]);
  const [netWorthStart,setNetWorthStart]=useState(0);
  const [cashflowNotes,setCashflowNotes]=useState({});
  const [fixedExpenses,setFixedExpenses]=useState({necessary:[],investment:[],unnecessary:[]});
  const [tab,setTab]=useState("transactions");
  const [filterMonth,setFilterMonth]=useState(now.getMonth());
  const [filterYear,setFilterYear]=useState(now.getFullYear());
  const [txFilter,setTxFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [showInvAdd,setShowInvAdd]=useState(false);
  const [showNWEdit,setShowNWEdit]=useState(false);
  const [editTx,setEditTx]=useState(null);
  const [nwInput,setNwInput]=useState("");
  const [form,setForm]=useState({type:"expense",amount:"",category:"food",note:"",date:now.toISOString().slice(0,10)});
  const [invForm,setInvForm]=useState({name:"",amount:"",qty:"",type:"Akcie",currency:"CZK",date:now.toISOString().slice(0,10)});

  useEffect(()=>{
    const d=loadData();
    if(d){
      setTransactions(d.transactions||[]);
      setInvestments(d.investments||[]);
      setNetWorthStart(d.netWorthStart||0);
      setCashflowNotes(d.cashflowNotes||{});
      const fe=d.fixedExpenses||{necessary:[],investment:[],unnecessary:[]};
      if(!fe.investment) fe.investment=[];
      setFixedExpenses(fe);
    }
  },[]);
  useEffect(()=>{saveData({transactions,investments,netWorthStart,cashflowNotes,fixedExpenses});},[transactions,investments,netWorthStart,cashflowNotes,fixedExpenses]);

  const filtered=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===filterMonth&&d.getFullYear()===filterYear;});
  const totalIncome=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const cashflow=totalIncome-totalExpense;
  const allIncome=transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const allExpense=transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const netWorth=netWorthStart+allIncome-allExpense;
  const invByCurrency=INV_CURRENCIES.reduce((acc,cur)=>{acc[cur]=investments.filter(i=>i.currency===cur).reduce((s,i)=>s+i.amount*(i.qty||1),0);return acc;},{});
  const expByCat=EXPENSE_CATEGORIES.reduce((acc,c)=>{acc[c.id]=filtered.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.amount,0);return acc;},{});
  const pieData=EXPENSE_CATEGORIES.filter(c=>expByCat[c.id]>0).sort((a,b)=>expByCat[b.id]-expByCat[a.id]).map(c=>({label:c.label,icon:c.icon,color:c.color,value:expByCat[c.id]}));
  const cfNoteKey=`${filterYear}-${filterMonth}`;
  const cfNote=cashflowNotes[cfNoteKey]||"";
  const sumNec=fixedExpenses.necessary.reduce((s,r)=>s+parseAmount(r.amount),0);
  const sumInv=fixedExpenses.investment.reduce((s,r)=>s+parseAmount(r.amount),0);
  const sumUnnec=fixedExpenses.unnecessary.reduce((s,r)=>s+parseAmount(r.amount),0);

  function addTx(){
    const amt=parseAmount(form.amount);
    if(!amt||amt<=0)return;
    if(editTx){
      setTransactions(p=>p.map(t=>t.id===editTx?{...t,type:form.type,amount:amt,category:form.category,note:form.note,date:form.date}:t));
      setEditTx(null);
    } else {
      setTransactions(p=>[{id:Date.now().toString(),type:form.type,amount:amt,category:form.category,note:form.note,date:form.date},...p]);
    }
    setForm({type:"expense",amount:"",category:"food",note:"",date:now.toISOString().slice(0,10)});
    setShowAdd(false);
  }
  function openEdit(tx){
    setForm({type:tx.type,amount:String(tx.amount),category:tx.category,note:tx.note||"",date:tx.date});
    setEditTx(tx.id);
    setShowAdd(true);
  }
  function addInv(){
    const amt=parseAmount(invForm.amount);
    if(!invForm.name||!amt||amt<=0)return;
    setInvestments(p=>[{id:Date.now().toString(),name:invForm.name,amount:amt,qty:invForm.qty?parseAmount(invForm.qty):1,type:invForm.type,currency:invForm.currency,date:invForm.date},...p]);
    setInvForm({name:"",amount:"",qty:"",type:"Akcie",currency:"CZK",date:now.toISOString().slice(0,10)});
    setShowInvAdd(false);
  }
  function prevMonth(){if(filterMonth===0){setFilterMonth(11);setFilterYear(y=>y-1);}else setFilterMonth(m=>m-1);}
  function nextMonth(){if(filterMonth===11){setFilterMonth(0);setFilterYear(y=>y+1);}else setFilterMonth(m=>m+1);}
  function addFixedRow(type){setFixedExpenses(p=>({...p,[type]:[...p[type],{id:Date.now().toString(),label:"",amount:""}]}));}
  function updateFixedRow(type,id,field,val){setFixedExpenses(p=>({...p,[type]:p[type].map(r=>r.id===id?{...r,[field]:val}:r)}));}
  function removeFixedRow(type,id){setFixedExpenses(p=>({...p,[type]:p[type].filter(r=>r.id!==id)}));}

  const visibleTx=[...filtered].filter(t=>txFilter==="all"?true:t.type===txFilter).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Group by date
  const txByDay=visibleTx.reduce((acc,tx)=>{
    if(!acc[tx.date]) acc[tx.date]=[];
    acc[tx.date].push(tx);
    return acc;
  },{});
  const sortedDays=Object.keys(txByDay).sort((a,b)=>new Date(b)-new Date(a));

  const s={
    app:{fontFamily:"'DM Sans',sans-serif",background:"#F8FAFC",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:88},
    hdr:{background:"#fff",padding:"16px 20px 12px",borderBottom:"1px solid #E2E8F0",position:"sticky",top:0,zIndex:10},
    row:{display:"flex",justifyContent:"space-between",alignItems:"center"},
    title:{fontSize:21,fontWeight:800,color:"#0F172A",margin:0,letterSpacing:"-0.5px"},
    msel:{display:"flex",alignItems:"center",gap:8,marginTop:10},
    mbtn:{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#64748B",padding:"2px 8px"},
    mlbl:{fontSize:14,fontWeight:600,color:"#334155",minWidth:110,textAlign:"center"},
    nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #E2E8F0",display:"flex",zIndex:20},
    nb:(a)=>({flex:1,border:"none",background:"none",padding:"8px 0 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,color:a?"#3B82F6":"#94A3B8",fontSize:9,fontWeight:a?700:500}),
    fab:{position:"fixed",bottom:68,right:"calc(50% - 215px + 16px)",width:52,height:52,borderRadius:"50%",background:"#3B82F6",border:"none",color:"#fff",fontSize:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(59,130,246,0.4)",zIndex:25},
    card:{background:"#fff",borderRadius:16,padding:16,margin:"12px 16px 0",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"},
    lbl:{fontSize:12,color:"#94A3B8",fontWeight:500},
    sec:{fontSize:13,fontWeight:700,color:"#64748B",margin:"16px 16px 0",textTransform:"uppercase",letterSpacing:1},
    txi:{display:"flex",alignItems:"center",gap:10,padding:"9px 0"},
    tic:(c)=>({width:34,height:34,borderRadius:10,background:c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}),
    modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"},
    mbox:{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto"},
    inp:{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 14px",fontSize:15,outline:"none",boxSizing:"border-box",marginTop:6,background:"#F8FAFC"},
    pbtn:(bg)=>({width:"100%",background:bg||"#3B82F6",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:10}),
    ttog:{display:"flex",background:"#F1F5F9",borderRadius:10,padding:3,marginTop:6},
    tbtn:(a,c)=>({flex:1,border:"none",borderRadius:8,padding:"8px",fontSize:14,fontWeight:600,cursor:"pointer",background:a?c:"transparent",color:a?"#fff":"#94A3B8",transition:"all 0.2s"}),
    cg:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:6},
    cb:(a,c)=>({border:`2px solid ${a?c:"#E2E8F0"}`,borderRadius:10,padding:"8px 4px",background:a?c+"18":"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}),
    fr:{display:"flex",gap:8,margin:"12px 16px 0"},
    fb:(a)=>({flex:1,border:`1.5px solid ${a?"#3B82F6":"#E2E8F0"}`,borderRadius:10,padding:"8px",fontSize:13,fontWeight:a?700:500,cursor:"pointer",background:a?"#EFF6FF":"#fff",color:a?"#3B82F6":"#64748B",transition:"all 0.2s",textAlign:"center"}),
  };

  function FixedSection({type,title,color,rows,sum}){
    return(<>
      <div style={s.sec}>{title}</div>
      <div style={s.card}>
        {rows.map(row=>(
          <div key={row.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
            <input
              placeholder="Název..."
              value={row.label}
              onChange={e=>updateFixedRow(type,row.id,"label",e.target.value)}
              style={{flex:"1 1 0",minWidth:0,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"7px 8px",fontSize:13,outline:"none",background:"#F8FAFC"}}
            />
            <input
              placeholder="0"
              value={row.amount}
              onChange={e=>updateFixedRow(type,row.id,"amount",e.target.value)}
              style={{width:80,flexShrink:0,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"7px 8px",fontSize:13,outline:"none",background:"#F8FAFC",textAlign:"right"}}
              inputMode="decimal"
            />
            <button onClick={()=>removeFixedRow(type,row.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#CBD5E1",flexShrink:0,padding:"0 2px"}}>🗑</button>
          </div>
        ))}
        <button onClick={()=>addFixedRow(type)} style={{width:"100%",border:"1.5px dashed #E2E8F0",borderRadius:10,padding:"9px",fontSize:13,cursor:"pointer",background:"none",color:"#94A3B8",marginTop:2}}>+ Přidat řádek</button>
        <div style={{marginTop:10,paddingTop:10,borderTop:"2px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#334155"}}>Celkem</span>
          <span style={{fontSize:16,fontWeight:800,color}}>{formatCZK(sum)}</span>
        </div>
      </div>
    </>);
  }

  return(
    <div style={s.app}>
      <div style={s.hdr}>
        <div style={s.row}><h1 style={s.title}>💸 Wealth Flow</h1></div>
        <div style={s.msel}>
          <button style={s.mbtn} onClick={prevMonth}>‹</button>
          <span style={s.mlbl}>{MONTHS_CZ[filterMonth]} {filterYear}</span>
          <button style={s.mbtn} onClick={nextMonth}>›</button>
        </div>
      </div>

      {/* ZÁZNAMY */}
      {tab==="transactions" && (<>
        <div style={s.fr}>
          <button style={s.fb(txFilter==="all")} onClick={()=>setTxFilter("all")}>Vše</button>
          <button style={s.fb(txFilter==="expense")} onClick={()=>setTxFilter("expense")}>📤 Výdaje</button>
          <button style={s.fb(txFilter==="income")} onClick={()=>setTxFilter("income")}>📥 Příjmy</button>
        </div>
        {txFilter!=="all"&&(
          <div style={{...s.card,textAlign:"center",padding:"12px 16px"}}>
            <div style={s.lbl}>{txFilter==="expense"?"Výdaje tento měsíc":"Příjmy tento měsíc"}</div>
            <div style={{fontSize:26,fontWeight:800,color:txFilter==="expense"?"#EF4444":"#22C55E"}}>{formatCZK(txFilter==="expense"?totalExpense:totalIncome)}</div>
          </div>
        )}
        <div style={{...s.card,marginTop:12,padding:"0 16px"}}>
          {visibleTx.length===0
            ?<div style={{textAlign:"center",color:"#94A3B8",fontSize:14,padding:20}}>Žádné záznamy.<br/>Přidej první pomocí +</div>
            :sortedDays.map((day,di)=>(
              <div key={day}>
                {/* Den separator */}
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0 4px",borderTop:di===0?"none":"3px solid #E2E8F0",marginTop:di===0?0:2}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#94A3B8",whiteSpace:"nowrap"}}>{fmtDate(day)}</span>
                  <div style={{flex:1,height:1,background:"#F1F5F9"}}/>
                </div>
                {txByDay[day].map((tx,ti)=>{
                  const cat=getCat(tx.category);
                  return(
                    <div key={tx.id} style={{...s.txi,borderBottom:ti<txByDay[day].length-1?"1px solid #F8FAFC":"none"}}>
                      <div style={s.tic(cat.color)}>{cat.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:"#0F172A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.note||cat.label}</div>
                        <div style={{fontSize:11,color:"#94A3B8"}}>{cat.label}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:tx.type==="income"?"#22C55E":"#EF4444"}}>{tx.type==="income"?"+":"−"}{formatCZK(tx.amount)}</div>
                        <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:2}}>
                          <button onClick={()=>openEdit(tx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#94A3B8"}}>✏️</button>
                          <button onClick={()=>setTransactions(p=>p.filter(t=>t.id!==tx.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#CBD5E1"}}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))
          }
        </div>
      </>)}

      {/* PŘEHLED */}
      {tab==="dashboard" && (<>
        <div style={{...s.card,background:netWorth>=0?"linear-gradient(135deg,#1e3a5f,#2563EB)":"linear-gradient(135deg,#7f1d1d,#DC2626)",color:"#fff",cursor:"pointer"}}
          onClick={()=>{setNwInput(String(netWorthStart));setShowNWEdit(true);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,opacity:0.75,fontWeight:500,marginBottom:2}}>💼 Čistý majetek</div>
              <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>{formatCZK(netWorth)}</div>
              <div style={{fontSize:10,opacity:0.6,marginTop:2}}>Startovní: {formatCZK(netWorthStart)} · Klepni pro úpravu</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,opacity:0.7}}>Cash flow</div>
              <div style={{fontSize:18,fontWeight:800,color:cashflow>=0?"#86efac":"#fca5a5"}}>{cashflow>=0?"+":""}{formatCZK(cashflow)}</div>
            </div>
          </div>
        </div>
        <div style={{...s.card,padding:"12px 16px"}}>
          <div style={{fontSize:12,color:"#94A3B8",fontWeight:500,marginBottom:6}}>📝 Poznámka k cash flow — {MONTHS_CZ[filterMonth]}</div>
          <textarea placeholder="Proč byl tento měsíc výkyv?" value={cfNote} onChange={e=>setCashflowNotes(p=>({...p,[cfNoteKey]:e.target.value}))}
            style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box",background:"#F8FAFC",resize:"none",minHeight:72,fontFamily:"'DM Sans',sans-serif",color:"#334155",lineHeight:1.5}}/>
        </div>
        <div style={s.sec}>Výdaje dle kategorií</div>
        <div style={s.card}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flexShrink:0}}><PieChart data={pieData} size={148}/></div>
            <div style={{flex:1,overflowY:"auto",maxHeight:148}}>
              {pieData.length===0?<div style={{color:"#94A3B8",fontSize:13}}>Žádné výdaje</div>
                :pieData.map((d,i)=>{
                  const tot=pieData.reduce((s,x)=>s+x.value,0);
                  return(<div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                    <div style={{width:9,height:9,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                    <span style={{fontSize:12,color:"#334155",flex:1}}>{d.icon} {d.label}</span>
                    <span style={{fontSize:11,fontWeight:700,color:d.color}}>{Math.round((d.value/tot)*100)}%</span>
                  </div>);
                })}
            </div>
          </div>
        </div>
        <div style={s.sec}>Tento měsíc</div>
        <div style={{...s.card,display:"flex",gap:0,padding:0,overflow:"hidden"}}>
          {[{label:"Příjmy",val:totalIncome,color:"#22C55E"},{label:"Výdaje",val:totalExpense,color:"#EF4444"},{label:"Cash flow",val:cashflow,color:cashflow>=0?"#16A34A":"#DC2626"}].map((item,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",padding:"14px 4px",borderRight:i<2?"1px solid #F1F5F9":"none"}}>
              <div style={s.lbl}>{item.label}</div>
              <div style={{fontSize:14,fontWeight:800,color:item.color,marginTop:2}}>{formatCZK(item.val)}</div>
            </div>
          ))}
        </div>
      </>)}

      {/* PRAVIDELNÉ VÝDAJE */}
      {tab==="fixed" && (<>
        <FixedSection type="necessary" title="Nutné výdaje" color="#8B5CF6" rows={fixedExpenses.necessary} sum={sumNec}/>
        <FixedSection type="investment" title="Investiční výdaje" color="#0EA5E9" rows={fixedExpenses.investment} sum={sumInv}/>
        <FixedSection type="unnecessary" title="Zbytné výdaje" color="#EC4899" rows={fixedExpenses.unnecessary} sum={sumUnnec}/>
        <div style={{...s.card,background:"linear-gradient(135deg,#1e3a5f,#2563EB)",color:"#fff",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,opacity:0.7,marginBottom:2}}>Celkové pravidelné výdaje</div>
              <div style={{fontSize:26,fontWeight:800}}>{formatCZK(sumNec+sumInv+sumUnnec)}</div>
            </div>
            <div style={{textAlign:"right",fontSize:12,opacity:0.85,lineHeight:1.8}}>
              <div>Nutné: {formatCZK(sumNec)}</div>
              <div>Investice: {formatCZK(sumInv)}</div>
              <div>Zbytné: {formatCZK(sumUnnec)}</div>
            </div>
          </div>
        </div>
      </>)}

      {/* INVESTICE */}
      {tab==="invest" && (<>
        <div style={{...s.card,background:"linear-gradient(135deg,#0f2027,#2c5364)",color:"#fff"}}>
          <div style={{fontSize:12,opacity:0.7,marginBottom:10}}>📈 Celkem zainvestováno</div>
          <div style={{display:"flex",gap:0}}>
            {INV_CURRENCIES.map((cur,i)=>(
              <div key={cur} style={{flex:1,textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.15)":"none",padding:"0 4px"}}>
                <div style={{fontSize:10,opacity:0.6,marginBottom:3}}>{cur}</div>
                <div style={{fontSize:16,fontWeight:800}}>{formatMoney(invByCurrency[cur],cur)}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,opacity:0.5,marginTop:8,textAlign:"center"}}>{investments.length} pozic</div>
        </div>
        <div style={s.sec}>Investiční portfolio</div>
        <div style={s.card}>
          {investments.length===0
            ?<div style={{textAlign:"center",color:"#94A3B8",fontSize:14,padding:20}}>Žádné investice.<br/>Přidej pomocí +</div>
            :[...investments].sort((a,b)=>(b.amount*b.qty)-(a.amount*a.qty)).map(inv=>(
              <div key={inv.id} style={s.txi}>
                <div style={{...s.tic("#6366F1"),fontSize:20}}>📈</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#0F172A"}}>{inv.name}</div>
                  <div style={{fontSize:11,color:"#94A3B8"}}>{inv.type} · {inv.qty>1?`${inv.qty} ks`:""} · {new Date(inv.date).toLocaleDateString("cs-CZ")}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#6366F1"}}>{formatMoney(inv.amount*inv.qty,inv.currency||"CZK",true)}</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>{inv.currency||"CZK"}</div>
                  <button onClick={()=>setInvestments(p=>p.filter(i=>i.id!==inv.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#CBD5E1"}}>🗑</button>
                </div>
              </div>
            ))
          }
        </div>
      </>)}

      <button style={{...s.fab,display:tab==="dashboard"||tab==="fixed"?"none":"flex"}} onClick={()=>tab==="invest"?setShowInvAdd(true):setShowAdd(true)}>+</button>

      <nav style={s.nav}>
        {[{id:"transactions",icon:"📋",label:"Záznamy"},{id:"dashboard",icon:"📊",label:"Přehled"},{id:"fixed",icon:"🔁",label:"Výdaje"},{id:"invest",icon:"📈",label:"Investice"}].map(n=>(
          <button key={n.id} style={s.nb(tab===n.id)} onClick={()=>setTab(n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>

      {/* MODAL: Nový / upravit záznam */}
      {showAdd&&(
        <div style={s.modal} onClick={e=>{if(e.target===e.currentTarget){setShowAdd(false);setEditTx(null);}}}>
          <div style={s.mbox}>
            <div style={{...s.row,marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800}}>{editTx?"Upravit záznam":"Nový záznam"}</h2>
              <button onClick={()=>{setShowAdd(false);setEditTx(null);}} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94A3B8"}}>×</button>
            </div>
            <div style={s.ttog}>
              <button style={s.tbtn(form.type==="expense","#EF4444")} onClick={()=>setForm(f=>({...f,type:"expense",category:"food"}))}>📤 Výdaj</button>
              <button style={s.tbtn(form.type==="income","#22C55E")} onClick={()=>setForm(f=>({...f,type:"income",category:"salary"}))}>📥 Příjem</button>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Částka (Kč)</div>
              <input style={s.inp} type="text" inputMode="decimal" placeholder="0,00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Kategorie</div>
              <div style={s.cg}>
                {(form.type==="expense"?EXPENSE_CATEGORIES:INCOME_CATEGORIES).map(cat=>(
                  <button key={cat.id} style={s.cb(form.category===cat.id,cat.color)} onClick={()=>setForm(f=>({...f,category:cat.id}))}>
                    <span style={{fontSize:20}}>{cat.icon}</span>
                    <span style={{fontSize:9,color:"#334155",fontWeight:500,textAlign:"center",lineHeight:1.2}}>{cat.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Poznámka (volitelné)</div>
              <input style={s.inp} placeholder="Popis záznamu..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Datum</div>
              <input style={s.inp} type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <button style={s.pbtn(form.type==="income"?"#22C55E":"#3B82F6")} onClick={addTx}>{editTx?"Uložit změny":"Přidat záznam"}</button>
          </div>
        </div>
      )}

      {/* MODAL: Nová investice */}
      {showInvAdd&&(
        <div style={s.modal} onClick={e=>{if(e.target===e.currentTarget)setShowInvAdd(false);}}>
          <div style={s.mbox}>
            <div style={{...s.row,marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800}}>Nová investice</h2>
              <button onClick={()=>setShowInvAdd(false)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94A3B8"}}>×</button>
            </div>
            <div style={{marginTop:4}}>
              <div style={s.lbl}>Název</div>
              <input style={s.inp} placeholder="Název..." value={invForm.name} onChange={e=>setInvForm(f=>({...f,name:e.target.value}))}/>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Typ investice</div>
              <div style={{display:"flex",gap:8,marginTop:6}}>
                {INV_TYPES.map(t=>(
                  <button key={t} onClick={()=>setInvForm(f=>({...f,type:t}))}
                    style={{border:`1.5px solid ${invForm.type===t?"#6366F1":"#E2E8F0"}`,borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",background:invForm.type===t?"#EEF2FF":"#fff",color:invForm.type===t?"#6366F1":"#64748B",fontWeight:invForm.type===t?700:500}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Měna</div>
              <div style={{display:"flex",gap:8,marginTop:6}}>
                {INV_CURRENCIES.map(cur=>(
                  <button key={cur} onClick={()=>setInvForm(f=>({...f,currency:cur}))}
                    style={{flex:1,border:`1.5px solid ${invForm.currency===cur?"#3B82F6":"#E2E8F0"}`,borderRadius:8,padding:"8px",fontSize:14,fontWeight:invForm.currency===cur?700:500,cursor:"pointer",background:invForm.currency===cur?"#EFF6FF":"#fff",color:invForm.currency===cur?"#3B82F6":"#64748B"}}>
                    {cur}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <div style={{flex:1}}>
                <div style={s.lbl}>Cena za kus ({invForm.currency})</div>
                <input style={s.inp} type="text" inputMode="decimal" placeholder="0,00" value={invForm.amount} onChange={e=>setInvForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <div style={s.lbl}>Množství (ks)</div>
                <input style={s.inp} type="text" inputMode="decimal" placeholder="1" value={invForm.qty} onChange={e=>setInvForm(f=>({...f,qty:e.target.value}))}/>
              </div>
            </div>
            {invForm.amount&&(<div style={{marginTop:8,textAlign:"center",fontSize:13,color:"#6366F1",fontWeight:700}}>Celkem: {formatMoney(parseAmount(invForm.amount)*(parseAmount(invForm.qty)||1),invForm.currency,true)}</div>)}
            <div style={{marginTop:14}}>
              <div style={s.lbl}>Datum nákupu</div>
              <input style={s.inp} type="date" value={invForm.date} onChange={e=>setInvForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <button style={s.pbtn("#6366F1")} onClick={addInv}>Přidat investici</button>
          </div>
        </div>
      )}

      {/* MODAL: Net Worth */}
      {showNWEdit&&(
        <div style={s.modal} onClick={e=>{if(e.target===e.currentTarget)setShowNWEdit(false);}}>
          <div style={s.mbox}>
            <div style={{...s.row,marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800}}>Startovní hodnota</h2>
              <button onClick={()=>setShowNWEdit(false)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94A3B8"}}>×</button>
            </div>
            <div style={{fontSize:13,color:"#64748B",marginBottom:14,lineHeight:1.6}}>Zadej svůj aktuální majetek jako výchozí bod.</div>
            <div style={s.lbl}>Počáteční hodnota (Kč)</div>
            <input style={s.inp} type="text" inputMode="decimal" placeholder="0" value={nwInput} onChange={e=>setNwInput(e.target.value)}/>
            <button style={s.pbtn()} onClick={()=>{setNetWorthStart(parseAmount(nwInput));setShowNWEdit(false);}}>Uložit</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
