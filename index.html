  { id:"food",          label:"Jídlo",         icon:"🍽️", color:"#F97316" },
  { id:"shopping",      label:"Nákupy",        icon:"🛍️", color:"#F59E0B" },
  { id:"entertainment", label:"Zábava",        icon:"🎬", color:"#EC4899" },
  { id:"media",         label:"Média",         icon:"📺", color:"#6366F1" },
  { id:"investments",   label:"Investice",     icon:"📈", color:"#0EA5E9" },
  { id:"car",           label:"Auto",          icon:"🚗", color:"#64748B" },
  { id:"transport",     label:"Doprava",       icon:"🚌", color:"#3B82F6" },

const INV_TYPES = ["Akcie","Bitcoin","ETF"];
const INV_CURRENCIES = ["CZK","EUR","USD"];
const ALL_CATEGORIES = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES];
const MONTHS_CZ = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const DAYS_CZ = ["Ne","Po","Út","St","Čt","Pá","So"];

function formatMoney(n,currency,decimals=false){
  const fd=decimals?2:0;
  if(currency==="EUR") return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"EUR",maximumFractionDigits:fd}).format(n);
  if(currency==="USD") return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"USD",maximumFractionDigits:fd}).format(n);
  return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:fd}).format(n);
}
function formatCZK(n){return formatMoney(n,"CZK");}
const STORAGE_KEY="wealthflow_v1";
function loadData(){
  try{
    let r=localStorage.getItem(STORAGE_KEY);
    if(r) return JSON.parse(r);
    for(const old of ["wealthflow_v4","wealthflow_v3","wealthflow_v2"]){
      r=localStorage.getItem(old);
      if(r){const data=JSON.parse(r);localStorage.setItem(STORAGE_KEY,JSON.stringify(data));return data;}
    }
    return null;
  }catch{return null;}
}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}
function getCat(id){return ALL_CATEGORIES.find(c=>c.id===id)||{label:"Ostatní",icon:"📦",color:"#94A3B8"};}
function parseAmount(v){return parseFloat(String(v).replace(",","."))||0;}
function fmtDate(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  return `${d.getDate()}. ${MONTHS_CZ[d.getMonth()]} ${d.getFullYear()} (${DAYS_CZ[d.getDay()]})`;
}

}

// ── Interaktivní koláčový graf ──────────────────────────────────────────────
function PieChart({data, size=150, selected, onSelect}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0) return <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",padding:20,fontSize:13}}>Žádné výdaje</div>;
  const cx=size/2, cy=size/2, r=size/2-8;
  let angle=-Math.PI/2;
  const slices=data.filter(d=>d.value>0).map((d,i)=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    // offset pro zvýraznění
    const midAngle=angle-sweep/2;
    const ox=Math.cos(midAngle)*5, oy=Math.sin(midAngle)*5;
    const isSelected=selected===d.id;
    return{...d,i,
      path:`M${cx+( isSelected?ox:0)},${cy+(isSelected?oy:0)} L${x1+(isSelected?ox:0)},${y1+(isSelected?oy:0)} A${r},${r} 0 ${large},1 ${x2+(isSelected?ox:0)},${y2+(isSelected?oy:0)} Z`,
      midAngle,ox,oy,isSelected};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:"visible"}}>
      {slices.map((s,i)=>(
        <path key={i} d={s.path} fill={s.color}
          stroke={s.isSelected?"#fff":"#1a2e4a"}
          strokeWidth={s.isSelected?2.5:1.5}
          style={{cursor:"pointer",opacity:selected&&!s.isSelected?0.45:1,transition:"opacity 0.2s"}}
          onClick={()=>onSelect(s.isSelected?null:s.id)}
        />
      ))}
      <circle cx={cx} cy={cy} r={r*0.42} fill="#1a3a5c" style={{pointerEvents:"none"}}/>
      <text x={cx} y={cy-6} textAnchor="middle" fontSize={9} fill="#93C5FD" fontFamily="DM Sans" style={{pointerEvents:"none"}}>Výdaje</text>
      <text x={cx} y={cy+8} textAnchor="middle" fontSize={10} fill="#fff" fontWeight="700" fontFamily="DM Sans" style={{pointerEvents:"none"}}>{formatCZK(total)}</text>
    </svg>
  );
}

// ── Stabilní uncontrolled input pro Fixed výdaje ────────────────────────────
function StableInput({initialValue, onCommit, placeholder, isAmount}){
  const ref=useRef(null);
  // Synchronizuj jen pokud se hodnota zvenku změní (např. po smazání řádku)
  useEffect(()=>{
    if(ref.current && ref.current.value !== String(initialValue)){
      ref.current.value = String(initialValue);
    }
  },[initialValue]);
  return(
    <input
      ref={ref}
      defaultValue={initialValue}
      onBlur={e=>onCommit(e.target.value)}
      onChange={()=>{/* nechej klávesnici živou */}}
      placeholder={placeholder}
      inputMode={isAmount?"decimal":"text"}
      autoComplete="off"
      autoCorrect="off"
      autoCapitalize="off"
      spellCheck="false"
      style={isAmount
        ?{width:80,flexShrink:0,border:"1.5px solid rgba(147,197,253,0.25)",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",background:"rgba(255,255,255,0.07)",textAlign:"right",color:"#fff",fontFamily:"'DM Sans',sans-serif"}
        :{flex:"1 1 0",minWidth:0,border:"1.5px solid rgba(147,197,253,0.25)",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",background:"rgba(255,255,255,0.07)",color:"#fff",fontFamily:"'DM Sans',sans-serif"}
      }
    />
  );
}

// ── Wizard: nová transakce (5 kroků) ───────────────────────────────────────
// Krok 1: datum + typ  |  2: kategorie  |  3: částka  |  4: popis  |  (edit=vše)
function AddTxWizard({onClose, onSave, editTx, now}){
  const defaultDate=now.toISOString().slice(0,10);
  const [step,setStep]=useState(editTx?0:1);
  const [type,setType]=useState(editTx?editTx.type:"expense");
  const [date,setDate]=useState(editTx?editTx.date:defaultDate);
  const [category,setCategory]=useState(editTx?editTx.category:"food");
  const [amount,setAmount]=useState(editTx?String(editTx.amount):"");
  const [note,setNote]=useState(editTx?(editTx.note||""):"");
  const cats=type==="expense"?EXPENSE_CATEGORIES:INCOME_CATEGORIES;
  const selCat=getCat(category);
  const STEPS=4;

  function handleSave(){
    const amt=parseAmount(amount);
    if(!amt||amt<=0) return;
    onSave({type,date,category,amount:amt,note});
  }

  const ms={
    lbl:{fontSize:12,color:"#93C5FD",fontWeight:500,marginBottom:4,display:"block"},
    inp:{width:"100%",border:"1.5px solid rgba(147,197,253,0.3)",borderRadius:10,padding:"11px 14px",fontSize:15,outline:"none",background:"rgba(255,255,255,0.08)",color:"#fff",marginTop:4,fontFamily:"'DM Sans',sans-serif"},
    ttog:{display:"flex",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:3,marginBottom:14},
    tbtn:(a,c)=>({flex:1,border:"none",borderRadius:8,padding:"9px",fontSize:14,fontWeight:700,cursor:"pointer",background:a?c:"transparent",color:a?"#fff":"rgba(255,255,255,0.4)",transition:"all 0.2s"}),
    cg:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:4},
    cb:(a,c)=>({border:`2px solid ${a?c:"rgba(255,255,255,0.12)"}`,borderRadius:10,padding:"8px 4px",background:a?c+"33":"rgba(255,255,255,0.05)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}),
    nextBtn:(c)=>({width:"100%",background:c||"#2563EB",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:14}),
    rowBtns:{display:"flex",gap:8,marginTop:14},
    backBtn:{background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.7)",border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:600,cursor:"pointer",flex:1},
    dot:(a)=>({width:a?22:7,height:7,borderRadius:4,background:a?"#60A5FA":"rgba(255,255,255,0.2)",transition:"all 0.2s"}),
    hint:{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:14},
    closeBtn:{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:32,height:32,fontSize:18,cursor:"pointer",color:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",justifyContent:"center"},
  };

  const accentBtn=type==="income"?"#16A34A":"#2563EB";

  // Edit mode — vše na jedné stránce
  if(editTx) return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#1a3a5c",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto",border:"1px solid rgba(147,197,253,0.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#fff"}}>Upravit záznam</h2>
          <button onClick={onClose} style={ms.closeBtn}>×</button>
        </div>
        <div style={ms.ttog}>
          <button style={ms.tbtn(type==="expense","#EF4444")} onClick={()=>{setType("expense");setCategory("food");}}>📤 Výdaj</button>
          <button style={ms.tbtn(type==="income","#22C55E")} onClick={()=>{setType("income");setCategory("salary");}}>📥 Příjem</button>
        </div>
        <label style={ms.lbl}>Datum</label>
        <input style={ms.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <div style={{height:12}}/>
        <label style={ms.lbl}>Kategorie</label>
        <div style={ms.cg}>
          {(type==="expense"?EXPENSE_CATEGORIES:INCOME_CATEGORIES).map(cat=>(
            <button key={cat.id} style={ms.cb(category===cat.id,cat.color)} onClick={()=>setCategory(cat.id)}>
              <span style={{fontSize:20}}>{cat.icon}</span>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.75)",fontWeight:500,textAlign:"center",lineHeight:1.2}}>{cat.label}</span>
            </button>
          ))}
        </div>
        <div style={{height:12}}/>
        <label style={ms.lbl}>Částka (Kč)</label>
        <input style={ms.inp} type="text" inputMode="decimal" placeholder="0,00" value={amount} onChange={e=>setAmount(e.target.value)}/>
        <div style={{height:12}}/>
        <label style={ms.lbl}>Popis platby</label>
        <input style={ms.inp} type="text" inputMode="text" autoComplete="off" placeholder="Popis..." value={note} onChange={e=>setNote(e.target.value)}/>
        <button style={ms.nextBtn(accentBtn)} onClick={handleSave}>Uložit změny</button>
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#1a3a5c",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto",border:"1px solid rgba(147,197,253,0.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#fff"}}>Nový záznam</h2>
          <button onClick={onClose} style={ms.closeBtn}>×</button>
        </div>
        {/* Tečky průběhu */}
        <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:18}}>
          {[1,2,3,4].map(i=><div key={i} style={ms.dot(step>=i)}/>)}
        </div>

        {/* KROK 1 – datum + typ */}
        {step===1&&(<>
          <div style={ms.hint}>Krok 1 ze 4 — Typ a datum</div>
          <div style={ms.ttog}>
            <button style={ms.tbtn(type==="expense","#EF4444")} onClick={()=>{setType("expense");setCategory("food");}}>📤 Výdaj</button>
            <button style={ms.tbtn(type==="income","#22C55E")} onClick={()=>{setType("income");setCategory("salary");}}>📥 Příjem</button>
          </div>
          <label style={ms.lbl}>Datum platby</label>
          <input style={ms.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          <button style={ms.nextBtn(accentBtn)} onClick={()=>setStep(2)}>Pokračovat →</button>
        </>)}

        {/* KROK 2 – kategorie */}
        {step===2&&(<>
          <div style={ms.hint}>Krok 2 ze 4 — {type==="expense"?"📤 Výdaj":"📥 Příjem"} · {fmtDate(date)}</div>
          <label style={ms.lbl}>Kategorie</label>
          <div style={ms.cg}>
            {cats.map(cat=>(
              <button key={cat.id} style={ms.cb(category===cat.id,cat.color)} onClick={()=>setCategory(cat.id)}>
                <span style={{fontSize:20}}>{cat.icon}</span>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.75)",fontWeight:500,textAlign:"center",lineHeight:1.2}}>{cat.label}</span>
              </button>
            ))}
          </div>
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(1)}>← Zpět</button>
            <button style={{...ms.nextBtn(accentBtn),marginTop:0,flex:2}} onClick={()=>setStep(3)}>Pokračovat →</button>
          </div>
        </>)}

        {/* KROK 3 – částka */}
        {step===3&&(<>
          <div style={ms.hint}>Krok 3 ze 4 — {selCat.icon} {selCat.label} · {fmtDate(date)}</div>
          <label style={ms.lbl}>Částka (Kč)</label>
          <input
            style={ms.inp}
            type="text"
            inputMode="decimal"
            placeholder="0,00"
            value={amount}
            onChange={e=>setAmount(e.target.value)}
            autoFocus
          />
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(2)}>← Zpět</button>
            <button style={{...ms.nextBtn(accentBtn),marginTop:0,flex:2}} onClick={()=>{if(parseAmount(amount)>0) setStep(4);}}>Pokračovat →</button>
          </div>
        </>)}

        {/* KROK 4 – popis */}
        {step===4&&(<>
          <div style={ms.hint}>Krok 4 ze 4 — {selCat.icon} {selCat.label} · {formatCZK(parseAmount(amount))}</div>
          <label style={ms.lbl}>Popis platby (volitelné)</label>
          <input
            style={ms.inp}
            type="text"
            inputMode="text"
            autoComplete="off"
            autoCorrect="off"
            placeholder="Popis záznamu..."
            value={note}
            onChange={e=>setNote(e.target.value)}
            autoFocus
          />
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(3)}>← Zpět</button>
            <button style={{...ms.nextBtn(accentBtn),marginTop:0,flex:2}} onClick={handleSave}>Přidat záznam ✓</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Wizard: nová investice (5 kroků) ───────────────────────────────────────
// 1: datum  |  2: typ  |  3: měna  |  4: kusy + částka  |  5: název
function AddInvWizard({onClose, onSave, now}){

  const [date,setDate]=useState(defaultDate);
  const [invType,setInvType]=useState("Akcie");

    const amt=parseAmount(amount);

    closeBtn:{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:32,height:32,fontSize:18,cursor:"pointer",color:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",justifyContent:"center"},
    chip:(a,c)=>({border:`1.5px solid ${a?c:"rgba(255,255,255,0.15)"}`,borderRadius:10,padding:"12px 6px",fontSize:14,fontWeight:a?700:500,cursor:"pointer",background:a?c+"33":"rgba(255,255,255,0.05)",color:a?"#fff":"rgba(255,255,255,0.5)",flex:1,textAlign:"center",transition:"all 0.15s"}),

          <div style={{display:"flex",gap:8,marginTop:6}}>
            {INV_TYPES.map(t=>(
              <button key={t} style={ms.chip(invType===t,"#A78BFA")} onClick={()=>setInvType(t)}>{t}</button>
            ))}
          </div>
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(1)}>← Zpět</button>
            <button style={{...ms.nextBtn(),marginTop:0,flex:2}} onClick={()=>setStep(3)}>Pokračovat →</button>
          </div>
        </>)}

        {/* KROK 3 – měna */}
        {step===3&&(<>
          <div style={ms.hint}>Krok 3 z 5 — Měna · {invType}</div>
          <label style={ms.lbl}>Měna</label>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            {INV_CURRENCIES.map(cur=>(
              <button key={cur} style={ms.chip(currency===cur,"#60A5FA")} onClick={()=>setCurrency(cur)}>{cur}</button>
            ))}
          </div>
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(2)}>← Zpět</button>
            <button style={{...ms.nextBtn(),marginTop:0,flex:2}} onClick={()=>setStep(4)}>Pokračovat →</button>
          </div>
        </>)}

        {/* KROK 4 – kusy + částka */}
        {step===4&&(<>
          <div style={ms.hint}>Krok 4 z 5 — {invType} · {currency}</div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}>
              <label style={ms.lbl}>Počet kusů</label>
              <input style={ms.inp} type="text" inputMode="decimal" placeholder="1" value={qty} onChange={e=>setQty(e.target.value)} autoFocus/>
            </div>
            <div style={{flex:1}}>
              <label style={ms.lbl}>Cena za kus ({currency})</label>
              <input style={ms.inp} type="text" inputMode="decimal" placeholder="0,00" value={amount} onChange={e=>setAmount(e.target.value)}/>
            </div>
          </div>
          {amount&&(
            <div style={{marginTop:8,textAlign:"center",fontSize:13,color:"#A78BFA",fontWeight:700}}>
              Celkem: {formatMoney(parseAmount(amount)*(parseAmount(qty)||1),currency,true)}
            </div>
          )}
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(3)}>← Zpět</button>
            <button style={{...ms.nextBtn(),marginTop:0,flex:2}} onClick={()=>{if(parseAmount(amount)>0) setStep(5);}}>Pokračovat →</button>
          </div>
        </>)}

        {/* KROK 5 – název */}
        {step===5&&(<>
          <div style={ms.hint}>Krok 5 z 5 — {invType} · {currency} · {formatMoney(parseAmount(amount)*(parseAmount(qty)||1),currency,true)}</div>
          <label style={ms.lbl}>Název investice</label>
          <input
            style={ms.inp}
            type="text"
            inputMode="text"
            autoComplete="off"
            autoCorrect="off"
            placeholder="Název..."
            value={name}
            onChange={e=>setName(e.target.value)}
            autoFocus
          />
          <div style={ms.rowBtns}>
            <button style={ms.backBtn} onClick={()=>setStep(4)}>← Zpět</button>
            <button style={{...ms.nextBtn(),marginTop:0,flex:2}} onClick={handleSave}>Přidat investici ✓</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Hlavní App ──────────────────────────────────────────────────────────────
function App(){
  const now=new Date();
  const [transactions,setTransactions]=useState([]);
  const [investments,setInvestments]=useState([]);
  const [netWorthStart,setNetWorthStart]=useState(0);
  const [cashflowNotes,setCashflowNotes]=useState({});
  const [fixedExpenses,setFixedExpenses]=useState({necessary:[],investment:[],unnecessary:[]});
  const [tab,setTab]=useState("transactions");
  const [filterMonth,setFilterMonth]=useState(now.getMonth());
  const [filterYear,setFilterYear]=useState(now.getFullYear());
  const [txFilter,setTxFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [showInvAdd,setShowInvAdd]=useState(false);
  const [showNWEdit,setShowNWEdit]=useState(false);
  const [editTx,setEditTx]=useState(null);
  const [nwInput,setNwInput]=useState("");
  const [selectedPie,setSelectedPie]=useState(null);
  const topRef=useRef(null);

  useEffect(()=>{
    const d=loadData();
    if(d){
      setTransactions(d.transactions||[]);
      setInvestments(d.investments||[]);
      setNetWorthStart(d.netWorthStart||0);
      setCashflowNotes(d.cashflowNotes||{});
      const fe=d.fixedExpenses||{necessary:[],investment:[],unnecessary:[]};
      if(!fe.investment) fe.investment=[];
      setFixedExpenses(fe);
    }
  },[]);
  useEffect(()=>{saveData({transactions,investments,netWorthStart,cashflowNotes,fixedExpenses});},[transactions,investments,netWorthStart,cashflowNotes,fixedExpenses]);

  function scrollToTop(){
    window.scrollTo({top:0,behavior:"smooth"});
    if(topRef.current) topRef.current.scrollIntoView({behavior:"smooth"});
  }

  const filtered=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===filterMonth&&d.getFullYear()===filterYear;});
  const totalIncome=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const cashflow=totalIncome-totalExpense;
  const allIncome=transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const allExpense=transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const netWorth=netWorthStart+allIncome-allExpense;
  const invByCurrency=INV_CURRENCIES.reduce((acc,cur)=>{acc[cur]=investments.filter(i=>i.currency===cur).reduce((s,i)=>s+i.amount*(i.qty||1),0);return acc;},{});
  const expByCat=EXPENSE_CATEGORIES.reduce((acc,c)=>{acc[c.id]=filtered.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.amount,0);return acc;},{});
  const pieData=EXPENSE_CATEGORIES.filter(c=>expByCat[c.id]>0).sort((a,b)=>expByCat[b.id]-expByCat[a.id]).map(c=>({id:c.id,label:c.label,icon:c.icon,color:c.color,value:expByCat[c.id]}));
  const cfNoteKey=`${filterYear}-${filterMonth}`;
  const cfNote=cashflowNotes[cfNoteKey]||"";
  const sumNec=fixedExpenses.necessary.reduce((s,r)=>s+parseAmount(r.amount),0);
  const sumInv=fixedExpenses.investment.reduce((s,r)=>s+parseAmount(r.amount),0);
  const sumUnnec=fixedExpenses.unnecessary.reduce((s,r)=>s+parseAmount(r.amount),0);

  function handleSaveTx(data){
    if(editTx){
      setTransactions(p=>p.map(t=>t.id===editTx?{...t,...data}:t));
      setEditTx(null);
    } else {
      setTransactions(p=>[{id:Date.now().toString(),...data},...p]);
    }
    setShowAdd(false);
    setTimeout(scrollToTop,100);
  }

  function handleSaveInv(data){
    setInvestments(p=>[{id:Date.now().toString(),...data},...p]);
    setShowInvAdd(false);
    setTimeout(scrollToTop,100);
  }

  function openEdit(tx){setEditTx(tx.id);setShowAdd(true);}
  function prevMonth(){if(filterMonth===0){setFilterMonth(11);setFilterYear(y=>y-1);}else setFilterMonth(m=>m-1);}
  function nextMonth(){if(filterMonth===11){setFilterMonth(0);setFilterYear(y=>y+1);}else setFilterMonth(m=>m+1);}
  function addFixedRow(type){setFixedExpenses(p=>({...p,[type]:[...p[type],{id:Date.now().toString(),label:"",amount:""}]}));}
  // onBlur commit — klávesnice zůstane živá při psaní
  function commitFixedRow(type,id,field,val){setFixedExpenses(p=>({...p,[type]:p[type].map(r=>r.id===id?{...r,[field]:val}:r)}));}
  function removeFixedRow(type,id){setFixedExpenses(p=>({...p,[type]:p[type].filter(r=>r.id!==id)}));}

  const visibleTx=[...filtered].filter(t=>txFilter==="all"||t.type===txFilter).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const txByDay=visibleTx.reduce((acc,tx)=>{if(!acc[tx.date])acc[tx.date]=[];acc[tx.date].push(tx);return acc;},{});
  const sortedDays=Object.keys(txByDay).sort((a,b)=>new Date(b)-new Date(a));

  const BG="#1E3A5F", CARD="rgba(255,255,255,0.07)", BORDER="rgba(147,197,253,0.15)";
  const ACCENT="#3B82F6", TEXT="#fff", TEXTSEC="rgba(255,255,255,0.55)", TEXTHINT="rgba(255,255,255,0.3)";

  const s={
    app:{fontFamily:"'DM Sans',sans-serif",background:BG,minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:88},
    hdr:{background:"#152d4d",padding:"16px 20px 12px",borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10},
    title:{fontSize:21,fontWeight:800,color:TEXT,margin:0,letterSpacing:"-0.5px",display:"flex",alignItems:"center",gap:8},
    walletBadge:{width:32,height:32,borderRadius:9,background:ACCENT,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
    msel:{display:"flex",alignItems:"center",gap:8,marginTop:10},
    mbtn:{background:"rgba(255,255,255,0.08)",border:`1px solid ${BORDER}`,cursor:"pointer",fontSize:16,color:"#93C5FD",padding:"3px 12px",borderRadius:8},
    mlbl:{fontSize:14,fontWeight:700,color:"#93C5FD",minWidth:110,textAlign:"center"},
    nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#152d4d",borderTop:`1px solid ${BORDER}`,display:"flex",zIndex:20},
    nb:(a)=>({flex:1,border:"none",background:"none",padding:"8px 0 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,color:a?"#60A5FA":TEXTHINT,fontSize:9,fontWeight:a?700:500}),
    fab:{position:"fixed",bottom:68,right:"calc(50% - 215px + 16px)",width:52,height:52,borderRadius:"50%",background:ACCENT,border:"none",color:"#fff",fontSize:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 18px rgba(37,99,235,0.5)",zIndex:25},
    card:{background:CARD,borderRadius:16,padding:16,margin:"10px 14px 0",border:`1px solid ${BORDER}`},
    lbl:{fontSize:12,color:"#93C5FD",fontWeight:500},
    sec:{fontSize:11,fontWeight:700,color:"#60A5FA",margin:"16px 14px 0",textTransform:"uppercase",letterSpacing:1.2},
    txi:{display:"flex",alignItems:"center",gap:10,padding:"9px 0"},
    tic:(c)=>({width:34,height:34,borderRadius:10,background:c+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}),
    fr:{display:"flex",gap:8,margin:"10px 14px 0"},
    fb:(a)=>({flex:1,border:`1.5px solid ${a?ACCENT:BORDER}`,borderRadius:10,padding:"8px",fontSize:13,fontWeight:a?700:500,cursor:"pointer",background:a?"rgba(59,130,246,0.25)":"rgba(255,255,255,0.04)",color:a?"#93C5FD":TEXTSEC,transition:"all 0.2s",textAlign:"center"}),
    inp:{width:"100%",border:`1.5px solid ${BORDER}`,borderRadius:10,padding:"10px 14px",fontSize:15,outline:"none",background:"rgba(255,255,255,0.08)",color:TEXT,marginTop:6,fontFamily:"'DM Sans',sans-serif"},
    pbtn:(bg)=>({width:"100%",background:bg||ACCENT,color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:10}),
  };

  function FixedSection({type,title,color,rows,sum}){
    return(<>
      <div style={s.sec}>{title}</div>
      <div style={s.card}>
        {rows.map(row=>(
          <div key={row.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <StableInput
              initialValue={row.label}
              onCommit={val=>commitFixedRow(type,row.id,"label",val)}
              placeholder="Název..."
              isAmount={false}
            />
            <StableInput
              initialValue={row.amount}
              onCommit={val=>commitFixedRow(type,row.id,"amount",val)}
              placeholder="0"
              isAmount={true}
            />
            <button onClick={()=>removeFixedRow(type,row.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:TEXTHINT,flexShrink:0,padding:"0 2px"}}>🗑</button>
          </div>
        ))}
        <button onClick={()=>addFixedRow(type)} style={{width:"100%",border:`1.5px dashed ${BORDER}`,borderRadius:10,padding:"9px",fontSize:13,cursor:"pointer",background:"none",color:TEXTHINT,marginTop:2}}>+ Přidat řádek</button>
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:TEXT}}>Celkem</span>
          <span style={{fontSize:16,fontWeight:800,color}}>{formatCZK(sum)}</span>
        </div>
      </div>
    </>);
  }

  return(
    <div style={s.app} ref={topRef}>
      <div style={s.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h1 style={s.title}>
            <div style={s.walletBadge}><WalletIcon size={18} color="#fff"/></div>
            Finance
          </h1>
        </div>
        <div style={s.msel}>
          <button style={s.mbtn} onClick={prevMonth}>‹</button>
          <span style={s.mlbl}>{MONTHS_CZ[filterMonth]} {filterYear}</span>
          <button style={s.mbtn} onClick={nextMonth}>›</button>
        </div>
      </div>

      {/* ZÁZNAMY */}
      {tab==="transactions"&&(<>
        <div style={s.fr}>
          <button style={s.fb(txFilter==="all")} onClick={()=>setTxFilter("all")}>Vše</button>
          <button style={s.fb(txFilter==="expense")} onClick={()=>setTxFilter("expense")}>📤 Výdaje</button>
          <button style={s.fb(txFilter==="income")} onClick={()=>setTxFilter("income")}>📥 Příjmy</button>
        </div>
        {txFilter!=="all"&&(
          <div style={{...s.card,textAlign:"center",padding:"12px 16px"}}>
            <div style={s.lbl}>{txFilter==="expense"?"Výdaje tento měsíc":"Příjmy tento měsíc"}</div>
            <div style={{fontSize:26,fontWeight:800,color:txFilter==="expense"?"#F87171":"#4ADE80",marginTop:4}}>{formatCZK(txFilter==="expense"?totalExpense:totalIncome)}</div>
          </div>
        )}
        <div style={{...s.card,marginTop:10,padding:"0 14px"}}>
          {visibleTx.length===0
            ?<div style={{textAlign:"center",color:TEXTHINT,fontSize:14,padding:24}}>Žádné záznamy.<br/>Přidej první pomocí +</div>
            :sortedDays.map((day,di)=>(
              <div key={day}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0 4px",borderTop:di===0?"none":`1px solid ${BORDER}`,marginTop:di===0?0:4}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#60A5FA",whiteSpace:"nowrap"}}>{fmtDate(day)}</span>
                  <div style={{flex:1,height:1,background:BORDER}}/>
                </div>
                {txByDay[day].map((tx,ti)=>{
                  const cat=getCat(tx.category);
                  return(
                    <div key={tx.id} style={{...s.txi,borderBottom:ti<txByDay[day].length-1?`1px solid ${BORDER}`:"none"}}>
                      <div style={s.tic(cat.color)}>{cat.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.note||cat.label}</div>
                        <div style={{fontSize:11,color:TEXTSEC}}>{cat.label}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:tx.type==="income"?"#4ADE80":"#F87171"}}>{tx.type==="income"?"+":"−"}{formatCZK(tx.amount)}</div>
                        <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:2}}>
                          <button onClick={()=>openEdit(tx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:TEXTSEC}}>✏️</button>
                          <button onClick={()=>setTransactions(p=>p.filter(t=>t.id!==tx.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:TEXTHINT}}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))
          }
        </div>
      </>)}

      {/* PŘEHLED */}
      {tab==="dashboard"&&(<>
        <div style={{...s.card,background:netWorth>=0?"linear-gradient(135deg,#0f2942,#1D4ED8)":"linear-gradient(135deg,#4c0519,#DC2626)",cursor:"pointer",border:"none"}}
          onClick={()=>{setNwInput(String(netWorthStart));setShowNWEdit(true);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:500,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                <WalletIcon size={13} color="rgba(255,255,255,0.6)"/> Čistý majetek
              </div>
              <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.5px",color:"#fff"}}>{formatCZK(netWorth)}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3}}>Startovní: {formatCZK(netWorthStart)} · Klepni pro úpravu</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>Cash flow</div>
              <div style={{fontSize:20,fontWeight:800,color:cashflow>=0?"#86efac":"#fca5a5",marginTop:2}}>{cashflow>=0?"+":""}{formatCZK(cashflow)}</div>
            </div>
          </div>
        </div>

        <div style={{...s.card,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:"#93C5FD",fontWeight:500,marginBottom:6}}>📝 Poznámka — {MONTHS_CZ[filterMonth]}</div>
          <textarea placeholder="Proč byl tento měsíc výkyv?" value={cfNote} onChange={e=>setCashflowNotes(p=>({...p,[cfNoteKey]:e.target.value}))}
            inputMode="text"
            style={{width:"100%",border:`1.5px solid ${BORDER}`,borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",background:"rgba(255,255,255,0.06)",resize:"none",minHeight:72,fontFamily:"'DM Sans',sans-serif",color:TEXT,lineHeight:1.5}}/>
        </div>

        <div style={s.sec}>Výdaje dle kategorií</div>
        <div style={s.card}>
          {pieData.length===0
            ? <div style={{textAlign:"center",color:TEXTHINT,fontSize:13,padding:16}}>Žádné výdaje tento měsíc</div>
            : (<div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{flexShrink:0}}>
                  <PieChart data={pieData} size={148} selected={selectedPie} onSelect={setSelectedPie}/>
                </div>
                <div style={{flex:1,overflowY:"auto",maxHeight:160}}>
                  {pieData.map((d,i)=>{
                    const tot=pieData.reduce((s,x)=>s+x.value,0);
                    const isSel=selectedPie===d.id;
                    const isOther=selectedPie&&!isSel;
                    return(
                      <div key={i}
                        onClick={()=>setSelectedPie(isSel?null:d.id)}
                        style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,cursor:"pointer",
                          opacity:isOther?0.38:1,
                          background:isSel?"rgba(255,255,255,0.08)":"transparent",
                          borderRadius:8,padding:"3px 5px",
                          border:isSel?`1px solid ${d.color}40`:"1px solid transparent",
                          transition:"all 0.18s"}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:d.color,flexShrink:0,
                          boxShadow:isSel?`0 0 6px ${d.color}`:"none",transition:"all 0.18s"}}/>
                        <span style={{fontSize:12,color:isSel?"#fff":TEXT,flex:1,fontWeight:isSel?700:400}}>{d.icon} {d.label}</span>
                        <span style={{fontSize:11,fontWeight:700,color:d.color}}>{Math.round((d.value/tot)*100)}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>)
          }
        </div>

        <div style={s.sec}>Tento měsíc</div>
        <div style={{...s.card,display:"flex",gap:0,padding:0,overflow:"hidden"}}>
          {[{label:"Příjmy",val:totalIncome,color:"#4ADE80"},{label:"Výdaje",val:totalExpense,color:"#F87171"},{label:"Cash flow",val:cashflow,color:cashflow>=0?"#34D399":"#F87171"}].map((item,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",padding:"14px 4px",borderRight:i<2?`1px solid ${BORDER}`:"none"}}>
              <div style={{fontSize:11,color:TEXTSEC}}>{item.label}</div>
              <div style={{fontSize:14,fontWeight:800,color:item.color,marginTop:3}}>{formatCZK(item.val)}</div>
            </div>
          ))}
        </div>
      </>)}

      {/* PRAVIDELNÉ VÝDAJE */}
      {tab==="fixed"&&(<>
        <FixedSection type="necessary" title="Nutné výdaje" color="#A78BFA" rows={fixedExpenses.necessary} sum={sumNec}/>
        <FixedSection type="investment" title="Investiční výdaje" color="#38BDF8" rows={fixedExpenses.investment} sum={sumInv}/>
        <FixedSection type="unnecessary" title="Zbytné výdaje" color="#F472B6" rows={fixedExpenses.unnecessary} sum={sumUnnec}/>
        <div style={{...s.card,background:"linear-gradient(135deg,#0f2942,#1D4ED8)",border:"none",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:3}}>Celkové pravidelné výdaje</div>
              <div style={{fontSize:26,fontWeight:800,color:"#fff"}}>{formatCZK(sumNec+sumInv+sumUnnec)}</div>
            </div>
            <div style={{textAlign:"right",fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.9}}>
              <div>Nutné: <b>{formatCZK(sumNec)}</b></div>
              <div>Investice: <b>{formatCZK(sumInv)}</b></div>
              <div>Zbytné: <b>{formatCZK(sumUnnec)}</b></div>
            </div>
          </div>
        </div>
      </>)}

      {/* INVESTICE */}
      {tab==="invest"&&(<>
        <div style={{...s.card,background:"linear-gradient(135deg,#0c1a2e,#1e3a5f)",border:"none"}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:10}}>📈 Celkem zainvestováno</div>
          <div style={{display:"flex",gap:0}}>
            {INV_CURRENCIES.map((cur,i)=>(
              <div key={cur} style={{flex:1,textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.1)":"none",padding:"0 4px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>{cur}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>{formatMoney(invByCurrency[cur],cur)}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:8,textAlign:"center"}}>{investments.length} pozic</div>
        </div>
        <div style={s.sec}>Investiční portfolio</div>
        <div style={s.card}>
          {investments.length===0
            ?<div style={{textAlign:"center",color:TEXTHINT,fontSize:14,padding:20}}>Žádné investice.<br/>Přidej pomocí +</div>
            :[...investments].sort((a,b)=>(b.amount*b.qty)-(a.amount*a.qty)).map(inv=>(
              <div key={inv.id} style={s.txi}>
                <div style={{...s.tic("#6366F1"),fontSize:20}}>📈</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{inv.name}</div>
                  <div style={{fontSize:11,color:TEXTSEC}}>{inv.type} · {inv.qty>1?`${inv.qty} ks · `:""}{new Date(inv.date).toLocaleDateString("cs-CZ")}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#A78BFA"}}>{formatMoney(inv.amount*inv.qty,inv.currency||"CZK",true)}</div>
                  <div style={{fontSize:10,color:TEXTHINT}}>{inv.currency||"CZK"}</div>
                  <button onClick={()=>setInvestments(p=>p.filter(i=>i.id!==inv.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:TEXTHINT}}>🗑</button>
                </div>
              </div>
            ))
          }
        </div>
      </>)}

      <button style={{...s.fab,display:tab==="dashboard"||tab==="fixed"?"none":"flex"}}
        onClick={()=>tab==="invest"?setShowInvAdd(true):setShowAdd(true)}>+</button>

      <nav style={s.nav}>
        {[{id:"transactions",icon:"📋",label:"Záznamy"},{id:"dashboard",icon:"📊",label:"Přehled"},{id:"fixed",icon:"🔁",label:"Výdaje"},{id:"invest",icon:"📈",label:"Investice"}].map(n=>(
          <button key={n.id} style={s.nb(tab===n.id)} onClick={()=>setTab(n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>

      {showAdd&&(
        <AddTxWizard
          now={now}
          editTx={editTx?transactions.find(t=>t.id===editTx):null}
          onClose={()=>{setShowAdd(false);setEditTx(null);}}
          onSave={handleSaveTx}
        />
      )}

      {showInvAdd&&(
        <AddInvWizard now={now} onClose={()=>setShowInvAdd(false)} onSave={handleSaveInv}/>
      )}

      {showNWEdit&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={e=>{if(e.target===e.currentTarget)setShowNWEdit(false);}}>
          <div style={{background:"#1a3a5c",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,border:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800,color:TEXT}}>Startovní hodnota</h2>
              <button onClick={()=>setShowNWEdit(false)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:32,height:32,fontSize:18,cursor:"pointer",color:TEXTSEC,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            <div style={{fontSize:13,color:TEXTSEC,marginBottom:14,lineHeight:1.6}}>Zadej svůj aktuální majetek jako výchozí bod.</div>
            <div style={{fontSize:12,color:"#93C5FD",fontWeight:500}}>Počáteční hodnota (Kč)</div>
            <input style={s.inp} type="text" inputMode="decimal" placeholder="0" value={nwInput} onChange={e=>setNwInput(e.target.value)}/>
            <button style={s.pbtn()} onClick={()=>{setNetWorthStart(parseAmount(nwInput));setShowNWEdit(false);}}>Uložit</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
